name: CI
on:
  push:
    branches:
      - main
      # Long-running integration branch for the generator-derivation work; the
      # differential/coverage/over-approximation evaluations must run in CI.
      - dev/generator
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          # The seeded statistical tests are calibrated to a released RNG
          # stream; 'pre' adds noise without guarding anything the dev branches
          # promise.
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      # ChronoSim, ClockGradients, and CompetingClocks resolve from the
      # [sources] git-URL entries in Project.toml, so a plain checkout builds.
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
  # Phase 4: compile the models to Quint and run the toolchain-gated checker tests
  # (typecheck, `quint run`, bounded Apalache trace validation + the mutation test).
  # A SEPARATE job — it does NOT gate the `test` job above. Versions are pinned per
  # ChronoSim.jl's quint_spike/VERSIONS.md.
  model-check:
    name: Model check (Quint + Apalache)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4          # VERSIONS.md: Node v22.16.0
        with:
          node-version: '22'
      - uses: actions/setup-java@v4          # VERSIONS.md: Temurin 17.0.19 (sets JAVA_HOME)
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install pinned Quint
        run: npm install --prefix quint-tools @informalsystems/quint@0.32.0
      - uses: actions/cache@v6               # ~/.quint holds apalache-dist-0.56.1
        with:
          path: ~/.quint
          key: apalache-0.56.1
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      # Deliberately re-runs the FULL suite (not just the quint testsets):
      # selection machinery isn't worth the maintenance while the whole run fits
      # the 30-minute timeout; the quint testsets activate via CHRONOSIM_QUINT.
      - name: Run the model-checking tests
        run: julia --project=. test/runtests.jl
        env:
          CHRONOSIM_QUINT: ${{ github.workspace }}/quint-tools
  docs:
    name: Documentation
    # The unregistered deps resolve from the [sources] git-URL entries in the
    # root and docs Project.toml files, so both environments build from a plain
    # checkout. Runs on every push and pull_request so the docs build (makedocs
    # + doctests) is validated on PRs; deploydocs only pushes on main/tags, where
    # DOCUMENTER_KEY exists, so pull_request runs build without deploying.
    runs-on: ubuntu-latest
    permissions:
      actions: write # needed to allow julia-actions/cache to proactively delete old caches that it has created
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate the docs environment
        shell: julia --project=docs --color=yes {0}
        run: |
          using Pkg
          Pkg.instantiate()
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
      - name: Run doctests
        shell: julia --project=docs --color=yes {0}
        run: |
          using Documenter: DocMeta, doctest
          using ChronoSimExamples
          DocMeta.setdocmeta!(ChronoSimExamples, :DocTestSetup, :(using ChronoSimExamples); recursive=true)
          doctest(ChronoSimExamples)
